# Decap CMS configuration.
#
# Two backends:
#   - local_backend: true  → talks to decap-server on :8081 (no auth,
#     `pnpm cms` to launch). This is the working mode until the GitHub
#     bridge is wired.
#   - backend: github       → production. Requires a small OAuth bridge
#     (Cloudflare Worker or standalone Vercel function). The `repo`
#     field below must point at the published GitHub repo before this
#     mode works.

backend:
  name: github
  repo: wallychang88/personal-portfolio
  branch: main
  # OAuth broker — a tiny Cloudflare Worker that holds the GitHub OAuth
  # client_secret. Source + deploy docs live in tools/decap-oauth/.
  # auth_endpoint defaults to "auth" → hits <base_url>/auth.
  base_url: https://decap-oauth-personal-portfolio.wallychang88.workers.dev

# local_backend stays true so `pnpm cms` + `pnpm dev` still works locally
# (Decap auto-detects localhost and uses the local proxy instead of base_url).
local_backend: true

media_folder: public/images
public_folder: /images

publish_mode: simple

collections:
  # Singletons — pages with one file each, edited in place. Decap's
  # "files" collection type for single-doc pages (about, future home
  # tagline, etc.).
  - name: pages
    label: Pages
    label_singular: Page
    # extension/format hint so Decap parses the file shape correctly.
    # Without these, Decap doesn't recognize .mdx and gives back a blank
    # editor. format: frontmatter splits the file into YAML frontmatter
    # (maps to non-body fields) and a body string (maps to the `body`
    # field). The body is MDX (markdown + component JSX), so we use a
    # code widget for it — the markdown widget would mangle <Section> tags.
    extension: mdx
    format: frontmatter
    files:
      - file: content/about.mdx
        label: About
        name: about
        fields:
          - label: "Title"
            name: title
            widget: string
            hint: "The big serif headline at the top of /about/. End with a period — it's the editorial voice."

          - label: "Tagline"
            name: tagline
            widget: string
            hint: "Italic one-liner under the title. Geography · era · the through-line in 6-8 words."

          - label: "Body (MDX)"
            name: body
            widget: code
            default_language: markdown
            hint: "Markdown with embedded JSX. Wrap top-of-page prose in <Prose>...</Prose>. Use <Section accent=\"sage|honey|rust|slate|clay\" symbol=\"◆\" eyebrow=\"Endurance identity\" heading=\"…\">…</Section> for accented sections; nest <SectionOrnament>…</SectionOrnament> inside for the top-right ornament. Available components: Section, SectionOrnament, Prose, Callout, OrnCompassRose, OrnEndurance, OrnThumbStamp."

  - name: essays
    label: Essays
    label_singular: Essay
    folder: content/essays
    create: true
    # Decap auto-slugifies the title into the filename — "Tioga, before
    # the cars." becomes tioga-before-the-cars.md. lib/essays.ts derives
    # the URL slug from the filename, so there's no separate slug field.
    # The filename is locked at create time; changing the title later
    # won't rename the file (which is what we want — published URLs stay
    # stable).
    slug: "{{title}}"
    extension: md
    format: frontmatter
    summary: "{{date}} — {{title}}"
    fields:
      - label: "Publish date"
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: false
        hint: "Used to sort the /writing/ index. Newest first."

      - label: "Title"
        name: title
        widget: string
        hint: "The big serif headline at the top of the essay. End with a period — it's the editorial voice."

      - label: "Hook"
        name: hook
        widget: string
        hint: "One sentence. Shown beside the title in the /writing/ index. Don't restate the title."

      - label: "Excerpt"
        name: excerpt
        widget: text
        hint: "Italic pull-quote shown in the index. Pick the line from the essay you'd want a stranger to read first."

      - label: "Category"
        name: cat
        widget: select
        options:
          - { label: "Sage — endurance", value: sage }
          - { label: "Rust — hardware / projects", value: rust }
          - { label: "Slate — software / roles", value: slate }
          - { label: "Honey — kitchen", value: honey }
          - { label: "Clay — writing", value: clay }
        hint: "Drives the tag-pill color in the index. Pick the dominant theme."

      - label: "Category label"
        name: catLabel
        widget: string
        hint: "The text shown next to the eyebrow, e.g. Endurance, Software, Kitchen. Title-case, one or two words."

      - label: "Body"
        name: body
        widget: markdown
        hint: "The essay itself. Use the toolbar — no need to memorize markdown. First paragraph automatically gets the drop-cap."

  - name: batches
    label: Bake batches
    label_singular: Batch
    folder: content/batches
    create: true
    # Filename auto-derived: "Batch 42 · Rye bagels, cold-shock skin."
    # becomes batch-42-rye-bagels-cold-shock-skin.md. lib/batches.ts
    # derives the slug from the filename — no manual slug field needed.
    slug: "{{title}}"
    extension: md
    format: frontmatter
    summary: "#{{number}} · {{kind}} · {{title}}"
    fields:
      - label: "Bake date"
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: false

      - label: "Batch number"
        name: number
        widget: number
        value_type: int
        min: 1
        hint: "Sequential. Find the last number in /kitchen/ and add 1."

      - label: "Kind"
        name: kind
        widget: select
        options: [bagel, bread, pizza]

      - label: "Title"
        name: title
        widget: string
        hint: "Short. What's interesting about this bake."

      - label: "Hydration"
        name: hydration
        widget: string
        required: false
        hint: "Optional. e.g. \"62%\" or \"65% poolish\""

      - label: "Ferment"
        name: ferment
        widget: string
        required: false
        hint: "Optional. e.g. \"36h cold + 2h warm\""

      - label: "Oven"
        name: oven
        widget: string
        required: false
        hint: "Optional. e.g. \"500°F · stone · 22 min\""

      - label: "Notes"
        name: notes
        widget: list
        required: false
        default: []
        hint: "Short bullet observations. One line per note. The 'Add' button creates more."

      - label: "Body (optional long-form)"
        name: body
        widget: markdown
        required: false
        hint: "Only if there's more to say than fits in the bullets. Most batches don't need this."
