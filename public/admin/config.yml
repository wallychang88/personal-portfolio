# Decap CMS configuration.
#
# Two backends:
#   - local_backend: true  → talks to decap-server on :8081 (no auth,
#     `pnpm cms` to launch). This is the working mode until the GitHub
#     bridge is wired.
#   - backend: github       → production. Requires a small OAuth bridge
#     (Cloudflare Worker or standalone Vercel function). The `repo`
#     field below must point at the published GitHub repo before this
#     mode works.

backend:
  name: github
  repo: wallychang88/personal-portfolio
  branch: main
  # OAuth broker — a tiny Cloudflare Worker that holds the GitHub OAuth
  # client_secret. Source + deploy docs live in tools/decap-oauth/.
  # auth_endpoint defaults to "auth" → hits <base_url>/auth.
  base_url: https://decap-oauth-personal-portfolio.wallychang88.workers.dev

# local_backend stays true so `pnpm cms` + `pnpm dev` still works locally
# (Decap auto-detects localhost and uses the local proxy instead of base_url).
local_backend: true

media_folder: public/images
public_folder: /images

publish_mode: simple

collections:
  # Singletons — pages with one file each, edited in place. Decap's
  # "files" collection type for single-doc pages (about, future home
  # tagline, etc.).
  - name: pages
    label: Pages
    label_singular: Page
    # format: frontmatter so Decap splits the file into YAML frontmatter
    # (maps to non-body fields) and the rest as a body string. Without
    # this hint Decap doesn't recognize .mdx and presents a blank editor.
    # extension is implied by the per-file `file:` path. The body is MDX
    # (markdown + component JSX), so we use a code widget — the markdown
    # widget would mangle <Section> tags.
    format: frontmatter
    files:
      - file: content/about.mdx
        label: About
        name: about
        fields:
          - label: "Title"
            name: title
            widget: string
            hint: "The big serif headline at the top of /about/. End with a period — it's the editorial voice."

          - label: "Tagline"
            name: tagline
            widget: string
            hint: "Italic one-liner under the title. Geography · era · the through-line in 6-8 words."

          - label: "Body (MDX)"
            name: body
            widget: code
            # output_code_only forces the widget to store the value as a
            # plain string instead of {lang, code} object — required when
            # the body comes from frontmatter parsing (a string). Without
            # this, Decap crashes trying to call .get('code') on a string.
            output_code_only: true
            default_language: markdown
            hint: "Markdown with embedded JSX. Wrap top-of-page prose in <Prose>...</Prose>. Use <Section accent=\"sage|honey|rust|slate|clay\" symbol=\"◆\" eyebrow=\"Endurance identity\" heading=\"…\">…</Section> for accented sections; nest <SectionOrnament>…</SectionOrnament> inside for the top-right ornament. Available components: Section, SectionOrnament, Prose, Callout, OrnCompassRose, OrnEndurance, OrnThumbStamp."

  - name: galleries
    label: Galleries
    label_singular: Gallery
    folder: content/galleries
    extension: yml
    format: yaml
    # Gallery IDs are referenced from page code (e.g. app/endurance reads
    # `endurance_whitney`), so creating new gallery files from /admin/
    # without also wiring them into a page is a footgun. Disable create;
    # existing galleries are still editable.
    create: false
    identifier_field: label
    # Photo uploads land in public/images/{gallery-id}/ so the per-gallery
    # folder structure stays consistent (matches what `pnpm new-photo`
    # writes). `{{slug}}` here is the gallery file's slug — the YAML
    # filename minus .yml — not the photo's slug.
    media_folder: "/public/images/{{slug}}"
    public_folder: "/images/{{slug}}"
    fields:
      - label: "Label"
        name: label
        widget: string
        hint: "Display name shown in the admin sidebar. Editor-facing only — page rendering uses the filename ID."

      - label: "Curatorial hint"
        name: hint
        widget: text
        required: false
        hint: "What kinds of photos belong here, suggested count, orientation tips. Editor-facing, doesn't render on the published page."

      - label: "Photos"
        name: photos
        widget: list
        required: false
        summary: "{{fields.alt}}"
        fields:
          - label: "Image"
            name: src
            widget: image
            hint: "Upload here lands in public/images/{gallery-id}/. The path stored is /images/{gallery-id}/{filename}."

          - label: "Alt text"
            name: alt
            widget: string
            hint: "What a screen reader announces. One sentence. Required."

          - label: "Caption"
            name: caption
            widget: string
            required: false
            hint: "Optional. Short caption shown under the image."

  - name: essays
    label: Essays
    label_singular: Essay
    folder: content/essays
    create: true
    # Decap auto-slugifies the title into the filename — "Tioga, before
    # the cars." becomes tioga-before-the-cars.md. lib/essays.ts derives
    # the URL slug from the filename, so there's no separate slug field.
    # The filename is locked at create time; changing the title later
    # won't rename the file (which is what we want — published URLs stay
    # stable).
    slug: "{{title}}"
    extension: md
    format: frontmatter
    summary: "{{date}} — {{title}}"
    fields:
      - label: "Publish date"
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: false
        hint: "Used to sort the /writing/ index. Newest first."

      - label: "Title"
        name: title
        widget: string
        hint: "The big serif headline at the top of the essay. End with a period — it's the editorial voice."

      - label: "Hook"
        name: hook
        widget: string
        hint: "One sentence. Shown beside the title in the /writing/ index. Don't restate the title."

      - label: "Excerpt"
        name: excerpt
        widget: text
        hint: "Italic pull-quote shown in the index. Pick the line from the essay you'd want a stranger to read first."

      - label: "Category"
        name: cat
        widget: select
        options:
          - { label: "Sage — endurance", value: sage }
          - { label: "Rust — hardware / projects", value: rust }
          - { label: "Slate — software / roles", value: slate }
          - { label: "Honey — kitchen", value: honey }
          - { label: "Clay — writing", value: clay }
        hint: "Drives the tag-pill color in the index. Pick the dominant theme."

      - label: "Category label"
        name: catLabel
        widget: string
        hint: "The text shown next to the eyebrow, e.g. Endurance, Software, Kitchen. Title-case, one or two words."

      - label: "Body"
        name: body
        widget: markdown
        hint: "The essay itself. Use the toolbar — no need to memorize markdown. First paragraph automatically gets the drop-cap."

  - name: batches
    label: Bake batches
    label_singular: Batch
    folder: content/batches
    create: true
    # Filename auto-derived: "Batch 42 · Rye bagels, cold-shock skin."
    # becomes batch-42-rye-bagels-cold-shock-skin.md. lib/batches.ts
    # derives the slug from the filename — no manual slug field needed.
    slug: "{{title}}"
    extension: md
    format: frontmatter
    summary: "#{{number}} · {{kind}} · {{title}}"
    fields:
      - label: "Bake date"
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: false

      - label: "Batch number"
        name: number
        widget: number
        value_type: int
        min: 1
        hint: "Sequential. Find the last number in /kitchen/ and add 1."

      - label: "Kind"
        name: kind
        widget: select
        options: [bagel, bread, pizza]

      - label: "Title"
        name: title
        widget: string
        hint: "Short. What's interesting about this bake."

      - label: "Hydration"
        name: hydration
        widget: string
        required: false
        hint: "Optional. e.g. \"62%\" or \"65% poolish\""

      - label: "Ferment"
        name: ferment
        widget: string
        required: false
        hint: "Optional. e.g. \"36h cold + 2h warm\""

      - label: "Oven"
        name: oven
        widget: string
        required: false
        hint: "Optional. e.g. \"500°F · stone · 22 min\""

      - label: "Notes"
        name: notes
        widget: list
        required: false
        default: []
        hint: "Short bullet observations. One line per note. The 'Add' button creates more."

      - label: "Body (optional long-form)"
        name: body
        widget: markdown
        required: false
        hint: "Only if there's more to say than fits in the bullets. Most batches don't need this."
