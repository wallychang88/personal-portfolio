# Decap CMS configuration.
#
# Two backends:
#   - local_backend: true  → talks to decap-server on :8081 (no auth,
#     `pnpm cms` to launch). This is the working mode until the GitHub
#     bridge is wired.
#   - backend: github       → production. Requires a small OAuth bridge
#     (Cloudflare Worker or standalone Vercel function). The `repo`
#     field below must point at the published GitHub repo before this
#     mode works.

backend:
  name: github
  repo: wallychang88/personal-portfolio
  branch: main
  # OAuth broker — a tiny Cloudflare Worker that holds the GitHub OAuth
  # client_secret. Source + deploy docs live in tools/decap-oauth/.
  # auth_endpoint defaults to "auth" → hits <base_url>/auth.
  base_url: https://decap-oauth-personal-portfolio.wallychang88.workers.dev

# local_backend stays true so `pnpm cms` + `pnpm dev` still works locally
# (Decap auto-detects localhost and uses the local proxy instead of base_url).
local_backend: true

media_folder: public/images
public_folder: /images

publish_mode: simple

collections:
  # Singletons — pages with one file each, edited in place. Decap's
  # "files" collection type for single-doc pages (about, future home
  # tagline, etc.).
  - name: pages
    label: Pages
    label_singular: Page
    # format: frontmatter so Decap splits the file into YAML frontmatter
    # (maps to non-body fields) and the rest as a body string. Without
    # this hint Decap doesn't recognize .mdx and presents a blank editor.
    # extension is implied by the per-file `file:` path. The body is MDX
    # (markdown + component JSX), so we use a code widget — the markdown
    # widget would mangle <Section> tags.
    format: frontmatter
    files:
      - file: content/about.mdx
        label: About
        name: about
        fields:
          - label: "Title"
            name: title
            widget: string
            hint: "The big serif headline at the top of /about/. End with a period — it's the editorial voice."

          - label: "Tagline"
            name: tagline
            widget: string
            hint: "Italic one-liner under the title. Geography · era · the through-line in 6-8 words."

          - label: "Body (MDX)"
            name: body
            widget: code
            # output_code_only forces the widget to store the value as a
            # plain string instead of {lang, code} object — required when
            # the body comes from frontmatter parsing (a string). Without
            # this, Decap crashes trying to call .get('code') on a string.
            output_code_only: true
            default_language: markdown
            hint: "Markdown with embedded JSX. Wrap top-of-page prose in <Prose>...</Prose>. Use <Section accent=\"sage|honey|rust|slate|clay\" symbol=\"◆\" eyebrow=\"Sweat identity\" heading=\"…\">…</Section> for accented sections; nest <SectionOrnament>…</SectionOrnament> inside for the top-right ornament. Available components: Section, SectionOrnament, Prose, Callout, OrnCompassRose, OrnEndurance, OrnThumbStamp."

      # /sweat/ page chrome (hero + masthead). Trophy entries live in
      # the separate "Trophies" folder collection below.
      - file: content/sweat.mdx
        label: Sweat
        name: sweat
        fields:
          - { label: "Meta title",       name: metaTitle,       widget: string, hint: "<title> tag. \"Sweat — Wally Chang\"." }
          - { label: "Meta description", name: metaDescription, widget: text,   hint: "<meta name=description>. One sentence. Shows in search results and link previews." }
          - { label: "Volume label",     name: volumeLabel,     widget: string, hint: "Tiny mono caption above the Wally Chang link in the top-left masthead. \"Field atlas · vol. III\"." }
          - { label: "Eyebrow",          name: eyebrow,         widget: string, hint: "Small-caps label above the hero headline. \"Trophy days\"." }
          - { label: "Heading",          name: heading,         widget: string, hint: "Hero h1. Sentence case, end with a period." }
          - { label: "Dek",              name: dek,             widget: text,   hint: "One or two sentences under the headline." }

      # /kitchen/ page chrome. Bake batches live in the "Bake batches"
      # folder collection further down.
      - file: content/kitchen.mdx
        label: Kitchen
        name: kitchen
        fields:
          - { label: "Meta title",         name: metaTitle,         widget: string, hint: "<title> tag." }
          - { label: "Meta description",   name: metaDescription,   widget: text,   hint: "<meta name=description>. One sentence." }
          - { label: "Eyebrow",            name: eyebrow,           widget: string, hint: "Small-caps label above the hero headline. \"Kitchen · ongoing\"." }
          - { label: "Heading",            name: heading,           widget: string, hint: "Hero h1." }
          - { label: "Dek",                name: dek,               widget: text,   hint: "Hero paragraph under the headline." }
          - { label: "Bagels — eyebrow",   name: bagelsEyebrow,     widget: string, hint: "Mono eyebrow above \"Bagels.\". \"Section · trophy bake\"." }
          - { label: "Bagels — heading",   name: bagelsHeading,     widget: string, hint: "h2 for the bagels section." }
          - { label: "Bagels — empty body", name: bagelsEmpty,      widget: text,   hint: "Italic placeholder shown when there are no bake batches yet." }
          - { label: "Bagels — empty stamp", name: bagelsEmptyStamp, widget: string, hint: "Thumb-stamp label shown when there are no batches. \"NO BATCH YET\"." }
          - { label: "Bagels — photos hint", name: bagelsPhotosHint, widget: string, hint: "Empty-state hint shown over the bagel photo strip when there are no photos yet." }
          - { label: "Practice — eyebrow", name: practiceEyebrow,   widget: string, hint: "Mono eyebrow above \"Bread & pizza.\". \"Section · practice\"." }
          - { label: "Practice — heading", name: practiceHeading,   widget: string, hint: "h2 for the bread + pizza section." }
          - { label: "Practice — dek",     name: practiceDek,       widget: text,   hint: "Italic paragraph under the practice heading." }
          - { label: "Bread label",        name: breadLabel,        widget: string, hint: "Column label above the bread photo grid." }
          - { label: "Bread photos hint",  name: breadPhotosHint,   widget: string, hint: "Empty-state hint shown over the bread photo grid." }
          - { label: "Pizza label",        name: pizzaLabel,        widget: string, hint: "Column label above the pizza photo grid." }
          - { label: "Pizza photos hint",  name: pizzaPhotosHint,   widget: string, hint: "Empty-state hint shown over the pizza photo grid." }

      # /writing/ index page chrome. Individual essays live in the
      # "Essays" folder collection further down.
      - file: content/writing.mdx
        label: Writing
        name: writing
        fields:
          - { label: "Meta title",       name: metaTitle,       widget: string, hint: "<title> tag." }
          - { label: "Meta description", name: metaDescription, widget: text,   hint: "<meta name=description>. One sentence." }
          - { label: "Eyebrow",          name: eyebrow,         widget: string, hint: "Small-caps label above the hero headline. \"Writing\"." }
          - { label: "Heading",          name: heading,         widget: string, hint: "Hero h1." }
          - { label: "Dek",              name: dek,             widget: text,   hint: "Hero paragraph under the headline." }
          - { label: "Empty body",       name: emptyBody,       widget: text,   hint: "Italic paragraph shown when the essay list is empty." }
          - { label: "Empty caption",    name: emptyCaption,    widget: string, hint: "Mono caption under the empty-state paragraph. \"No essays · 0 of 0 · come back soon\"." }

      # /timeline/ index page chrome. Individual entries live in the
      # "Timeline" folder collection further down. (Filename is
      # timeline-page.mdx — not timeline.mdx — so Decap doesn't confuse
      # it with the timeline folder.)
      - file: content/timeline-page.mdx
        label: Timeline (page chrome)
        name: timeline_page
        fields:
          - { label: "Meta title",       name: metaTitle,       widget: string, hint: "<title> tag." }
          - { label: "Meta description", name: metaDescription, widget: text,   hint: "<meta name=description>. One sentence." }
          - { label: "Eyebrow",          name: eyebrow,         widget: string, hint: "Small-caps label above the hero headline." }
          - { label: "Heading",          name: heading,         widget: string, hint: "Hero h1." }
          - { label: "Dek",              name: dek,             widget: text,   hint: "Hero paragraph under the headline." }

  - name: galleries
    label: Galleries
    label_singular: Gallery
    folder: content/galleries
    extension: yml
    format: yaml
    # Gallery IDs are referenced from page code (e.g. app/sweat reads
    # `sweat_whitney`), so creating new gallery files from /admin/
    # without also wiring them into a page is a footgun. Disable create;
    # existing galleries are still editable.
    create: false
    identifier_field: label
    # Photo uploads land in public/images/{gallery-id}/ so the per-gallery
    # folder structure stays consistent (matches what `pnpm new-photo`
    # writes). `{{slug}}` here is the gallery file's slug — the YAML
    # filename minus .yml — not the photo's slug.
    media_folder: "/public/images/{{slug}}"
    public_folder: "/images/{{slug}}"
    fields:
      - label: "Label"
        name: label
        widget: string
        hint: "Display name shown in the admin sidebar. Editor-facing only — page rendering uses the filename ID."

      - label: "Curatorial hint"
        name: hint
        widget: text
        required: false
        hint: "What kinds of photos belong here, suggested count, orientation tips. Editor-facing, doesn't render on the published page."

      - label: "Photos"
        name: photos
        widget: list
        required: false
        summary: "{{fields.alt}}"
        fields:
          - label: "Image"
            name: src
            widget: image
            hint: "Upload here lands in public/images/{gallery-id}/. The path stored is /images/{gallery-id}/{filename}."

          - label: "Alt text"
            name: alt
            widget: string
            hint: "What a screen reader announces. One sentence. Required."

          - label: "Caption"
            name: caption
            widget: string
            required: false
            hint: "Optional. Short caption shown under the image."

  - name: trophies
    label: Trophies (sweat)
    label_singular: Trophy
    folder: content/trophies
    # Disable create — the /sweat/ page maps trophy slug → gallery id +
    # route ornament via static maps in app/sweat/page.tsx. Adding a new
    # trophy from /admin/ without wiring those up would render a trophy
    # block with no photo strip and no elevation profile. Editing existing
    # trophies is safe.
    create: false
    identifier_field: title
    extension: mdx
    format: frontmatter
    summary: "{{order}} · {{title}}"
    fields:
      - label: "Sort order"
        name: order
        widget: number
        value_type: int
        min: 1
        hint: "Lower = earlier on /sweat/. Whitney=1, Tioga=2, Ironman=3."

      - label: "Kicker"
        name: kicker
        widget: string
        hint: "Mono eyebrow over the title. \"TROPHY · JULY 12–13, 2025\"."

      - label: "Title"
        name: title
        widget: string
        hint: "Display title. Editorial, not athletic. \"Mount Whitney, alpine start.\" Sentence case, end with a period."

      - label: "Dek"
        name: dek
        widget: string
        hint: "Italic deck under the title. \"Whitney Zone · Inyo National Forest · 14,505 ft\"."

      - label: "Coordinates"
        name: coords
        widget: string
        hint: "Mono lat/long stamp in the top-right corner of the trophy block."

      - label: "Stats"
        name: stats
        widget: list
        min: 4
        max: 4
        summary: "{{fields.label}} — {{fields.value}}"
        hint: "Exactly four stats. Render in a 4-up panel under the prose."
        fields:
          - { label: "Label", name: label, widget: string, hint: "Mono eyebrow above the value. \"Trip distance\"." }
          - { label: "Value", name: value, widget: string, hint: "Display-weight serif. \"21.5 mi\"." }
          - { label: "Sub",   name: sub,   widget: string, required: false, hint: "Optional mono annotation under the value." }

      - label: "Body"
        name: body
        widget: markdown
        # Plain paragraphs only — no JSX in trophy bodies — so we use the
        # real markdown widget (WYSIWYG toolbar) instead of the dark code
        # editor that projects + about need. The lib/trophies.ts loader
        # splits the body on blank lines into a paragraph array.
        hint: "The trophy paragraphs. Hit Enter twice for a new paragraph. Voice: warm, specific, no embellishment past WALLY.md. Only ship facts you can defend."

  - name: timeline
    label: Timeline
    label_singular: Entry
    folder: content/timeline
    create: true
    # Slug includes the sortDate prefix so a plain directory listing
    # sorts chronologically (oldest → newest); lib/timeline.ts re-sorts
    # to newest-first for display.
    slug: "{{sortDate}}-{{title}}"
    extension: md
    format: frontmatter
    summary: "{{sortDate}} — {{title}}"
    fields:
      - label: "Sort date"
        name: sortDate
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: false
        hint: "ISO date (YYYY-MM-DD). Used to sort + to prefix the filename. Doesn't have to match the displayed date below."

      - label: "Display date"
        name: date
        widget: string
        hint: "What the reader sees in the date column. \"May 2026\", \"Fall 2025 →\", \"2021 — 2024\" — whatever shape the entry deserves."

      - label: "Kind"
        name: kind
        widget: select
        options:
          - { label: "Project — something I built", value: project }
          - { label: "Writing — essay or opinion piece", value: writing }
          - { label: "Role — job or major engagement", value: role }
          - { label: "Coursework — academic project or paper", value: coursework }
          - { label: "Milestone — degree, talk, race, anything notable", value: milestone }
        hint: "Drives the kind label color + sort within same-day entries."

      - label: "Kind label"
        name: kindLabel
        widget: string
        required: false
        hint: "Optional. Small caption under the date — e.g. \"Project · shipped\", \"Sweat · trophy day\", \"Role · current\"."

      - label: "Title"
        name: title
        widget: string
        hint: "The headline. Sentence case for milestones (\"Tioga Road, before the cars.\"), title case for roles + projects."

      - label: "Tags"
        name: tags
        widget: list
        default: []
        hint: "Short topic tags shown as pills. Editor: type, hit Enter, repeat."

      - label: "Link"
        name: href
        widget: string
        required: false
        hint: "Optional. Internal route like /projects/doorpi/ or external URL. Omit for headline-only entries."

      - label: "Opens in new tab"
        name: external
        widget: boolean
        required: false
        default: false
        hint: "Only meaningful if Link is set. True for external URLs (target=\"_blank\")."

      - label: "Hook"
        name: body
        widget: markdown
        hint: "1-3 sentences. The reader's reason to click — what was hard, what was beautiful, what surprised you. Don't restate the title."

  - name: projects
    label: Project deep-dives
    label_singular: Project
    folder: content/projects
    create: true
    # Filename auto-derived from the title — "doorpi — a door that knows…"
    # becomes doorpi-a-door-that-knows.mdx. The URL slug is the filename
    # minus .mdx; editing the title later won't rename published URLs.
    slug: "{{title}}"
    extension: mdx
    # MDX isn't on Decap's known-format list, so without an explicit
    # format hint the editor opens with all fields empty and a save
    # overwrites the file with blanks. Same fix as content/about.mdx.
    format: frontmatter
    summary: "{{title}}"
    fields:
      - label: "Title"
        name: title
        widget: string
        hint: "Full page headline. \"doorpi — a door that knows my face and waits for a peace sign.\" Sentence case, end with a period."

      - label: "Dek"
        name: dek
        widget: string
        hint: "Italic subtitle under the title. One sentence; tech stack + the one interesting choice."

      - label: "Kicker"
        name: kicker
        widget: string
        hint: "Eyebrow above the title, e.g. \"Project · Shipped · April 2026\" or \"Project · In progress · 2026\"."

      - label: "Meta line"
        name: meta
        widget: string
        required: false
        hint: "Mono caption below the dek, e.g. \"Solo build · running 24/7 on doorpihost\". Optional."

      - label: "Tags"
        name: tags
        widget: list
        default: []
        hint: "Short topic tags. Editor: type, hit Enter, repeat."

      - label: "Category"
        name: cat
        widget: select
        default: rust
        options:
          - { label: "Rust — hardware / projects", value: rust }
          - { label: "Slate — software / roles", value: slate }
          - { label: "Sage — sweat", value: sage }
          - { label: "Honey — kitchen", value: honey }
          - { label: "Clay — writing", value: clay }
        hint: "Drives the eyebrow + tag-pill color. Rust for hardware, slate for software-only."

      - label: "Description"
        name: description
        widget: string
        hint: "<meta name=\"description\"> — one sentence, what the page is about. Shows in search results and link previews."

      - label: "Sort order"
        name: order
        widget: number
        required: false
        value_type: int
        min: 0
        hint: "Optional. Lower = earlier in a future /projects/ index. Omit if there's only one project."

      - label: "Draft"
        name: draft
        widget: boolean
        required: false
        default: false
        hint: "Hide from /projects/ index + skip generating /projects/{slug}/ at build time."

      - label: "Corner badges"
        name: badges
        widget: list
        required: false
        types:
          - label: "REV stamp"
            name: rev
            widget: object
            summary: "REV {{fields.rev}}"
            fields:
              - { label: "Rev label", name: rev, widget: string, hint: "e.g. v3" }
              - { label: "Stamp text", name: text, widget: string, default: "REV" }
          - label: "Status LED"
            name: led
            widget: object
            summary: "LED — {{fields.label}}"
            fields:
              - { label: "Label", name: label, widget: string, hint: "e.g. \"unlock · operational\"" }
              - { label: "Mobile label", name: mobileLabel, widget: string, required: false, hint: "Optional shorter label used in the inline-mobile fallback." }
        hint: "Optional. Renders in the top-right corner of the header on wide viewports and inline below the title on narrow ones. Add a REV stamp or a status LED."

      - label: "Body (MDX)"
        name: body
        widget: code
        # Same shape gotcha as content/about.mdx — frontmatter parsing
        # gives the body as a string; without output_code_only Decap
        # stores the value as {lang, code} and crashes on render.
        output_code_only: true
        default_language: markdown
        hint: "Markdown with embedded JSX. Available components: Figure (label, caption, children), ProjectColumns / ProjectMarginalia / MarginaliaCard (two-column layout with rail), EndNote, Prose, Section / SectionOrnament / Callout, StatPanel, and ornaments: OrnSchematic, OrnRevStamp, OrnLED, OrnPullQuote. See content/projects/doorpi.mdx for the canonical shape."

  - name: essays
    label: Essays
    label_singular: Essay
    folder: content/essays
    create: true
    # Decap auto-slugifies the title into the filename — "Tioga, before
    # the cars." becomes tioga-before-the-cars.md. lib/essays.ts derives
    # the URL slug from the filename, so there's no separate slug field.
    # The filename is locked at create time; changing the title later
    # won't rename the file (which is what we want — published URLs stay
    # stable).
    slug: "{{title}}"
    extension: md
    format: frontmatter
    summary: "{{date}} — {{title}}"
    fields:
      - label: "Publish date"
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: false
        hint: "Used to sort the /writing/ index. Newest first."

      - label: "Title"
        name: title
        widget: string
        hint: "The big serif headline at the top of the essay. End with a period — it's the editorial voice."

      - label: "Hook"
        name: hook
        widget: string
        hint: "One sentence. Shown beside the title in the /writing/ index. Don't restate the title."

      - label: "Excerpt"
        name: excerpt
        widget: text
        hint: "Italic pull-quote shown in the index. Pick the line from the essay you'd want a stranger to read first."

      - label: "Category"
        name: cat
        widget: select
        options:
          - { label: "Sage — sweat", value: sage }
          - { label: "Rust — hardware / projects", value: rust }
          - { label: "Slate — software / roles", value: slate }
          - { label: "Honey — kitchen", value: honey }
          - { label: "Clay — writing", value: clay }
        hint: "Drives the tag-pill color in the index. Pick the dominant theme."

      - label: "Category label"
        name: catLabel
        widget: string
        hint: "The text shown next to the eyebrow, e.g. Endurance, Software, Kitchen. Title-case, one or two words."

      - label: "Body"
        name: body
        widget: markdown
        hint: "The essay itself. Use the toolbar — no need to memorize markdown. First paragraph automatically gets the drop-cap."

  - name: batches
    label: Bake batches
    label_singular: Batch
    folder: content/batches
    create: true
    # Filename auto-derived: "Batch 42 · Rye bagels, cold-shock skin."
    # becomes batch-42-rye-bagels-cold-shock-skin.md. lib/batches.ts
    # derives the slug from the filename — no manual slug field needed.
    slug: "{{title}}"
    extension: md
    format: frontmatter
    summary: "#{{number}} · {{kind}} · {{title}}"
    fields:
      - label: "Bake date"
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: false

      - label: "Batch number"
        name: number
        widget: number
        value_type: int
        min: 1
        hint: "Sequential. Find the last number in /kitchen/ and add 1."

      - label: "Kind"
        name: kind
        widget: select
        options: [bagel, bread, pizza]

      - label: "Title"
        name: title
        widget: string
        hint: "Short. What's interesting about this bake."

      - label: "Hydration"
        name: hydration
        widget: string
        required: false
        hint: "Optional. e.g. \"62%\" or \"65% poolish\""

      - label: "Ferment"
        name: ferment
        widget: string
        required: false
        hint: "Optional. e.g. \"36h cold + 2h warm\""

      - label: "Oven"
        name: oven
        widget: string
        required: false
        hint: "Optional. e.g. \"500°F · stone · 22 min\""

      - label: "Notes"
        name: notes
        widget: list
        required: false
        default: []
        hint: "Short bullet observations. One line per note. The 'Add' button creates more."

      - label: "Body (optional long-form)"
        name: body
        widget: markdown
        required: false
        hint: "Only if there's more to say than fits in the bullets. Most batches don't need this."
